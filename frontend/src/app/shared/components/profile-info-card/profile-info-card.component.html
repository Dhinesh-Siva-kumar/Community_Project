<div class="info-card">
  <div class="info-card-header">
    <div class="card-title-row">
      @if (icon) {
        <span class="title-icon"><i [class]="'bi ' + icon" aria-hidden="true"></i></span>
      }
      <h6 class="card-title">{{ title }}</h6>
    </div>

    <div class="card-actions">
      @if (editMode) {
        <button type="button" class="btn btn-sm btn-light-soft" (click)="cancel.emit()" [disabled]="loading">
          <i class="bi bi-x-lg me-1"></i>Cancel
        </button>
        <button type="button" class="btn btn-sm btn-primary" (click)="save.emit()" [disabled]="loading"
                [attr.aria-busy]="loading">
          @if (loading) {
            <span class="spinner-border spinner-border-sm me-1" aria-hidden="true"></span>
          } @else {
            <i class="bi bi-check-lg me-1"></i>
          }
          Save
        </button>
      } @else {
        <button type="button" class="btn btn-sm btn-edit" (click)="edit.emit()">
          <i class="bi bi-pencil me-1"></i>Edit
        </button>
      }
    </div>
  </div>

  <div class="info-card-body">
    <ng-content></ng-content>
  </div>
</div>
