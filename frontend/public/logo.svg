<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none" role="img" aria-label="TamilConnect">
  <defs>
    <!-- Amber → Saffron gradient (brand colours) -->
    <linearGradient id="tc-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FBBF24"/>
      <stop offset="100%" stop-color="#F97316"/>
    </linearGradient>

    <!-- Subtle inner shadow for depth -->
    <filter id="tc-inset" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="1" stdDeviation="1" flood-color="rgba(0,0,0,0.15)"/>
    </filter>
  </defs>

  <!-- Rounded-square badge background -->
  <rect width="40" height="40" rx="10" ry="10" fill="url(#tc-grad)"/>

  <!-- Subtle top-left light sheen -->
  <rect width="40" height="20" rx="10" ry="10" fill="rgba(255,255,255,0.10)"/>

  <!-- ── Connection lines from center hub to 4 corner nodes ── -->
  <g stroke="rgba(255,255,255,0.55)" stroke-width="1.4" stroke-linecap="round">
    <line x1="20" y1="20" x2="10" y2="11"/>
    <line x1="20" y1="20" x2="30" y2="11"/>
    <line x1="20" y1="20" x2="10" y2="29"/>
    <line x1="20" y1="20" x2="30" y2="29"/>
  </g>

  <!-- ── 4 outer nodes (Tamil communities in different countries) ── -->
  <g fill="rgba(255,255,255,0.82)">
    <circle cx="10" cy="11" r="3.2"/>
    <circle cx="30" cy="11" r="3.2"/>
    <circle cx="10" cy="29" r="3.2"/>
    <circle cx="30" cy="29" r="3.2"/>
  </g>

  <!-- ── Central hub — white circle with bold "T" ── -->
  <circle cx="20" cy="20" r="6" fill="white" filter="url(#tc-inset)"/>

  <!-- "T" for TamilConnect — sized and centred precisely -->
  <text
    x="20"
    y="24"
    text-anchor="middle"
    font-family="'Arial Black', Arial, sans-serif"
    font-size="9"
    font-weight="900"
    fill="#F97316"
    letter-spacing="-0.5"
  >T</text>
</svg>
